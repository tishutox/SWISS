<!DOCTYPE html>
   <html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <!--=============== REMIXICONS ===============-->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">

      <!--=============== CSS ===============-->
      <link rel="stylesheet" href="assets/css/styles.css">

      <title>Responsive navbar - Bedimcode</title>
   </head>
   <body>
      <!--==================== HEADER ====================-->
      <header class="header" id="header">
         <nav class="nav container">
               <a href="#" class="nav__logo">
                  <img src="assets/img/logo.png" alt="SWISS Ticket logo" class="nav__logo-img">
               </a>

            <div class="nav__menu" id="nav-menu">
               <ul class="nav__list">
                  <li class="nav__item">
                     <a href="#" class="nav__link">
                        <span>Neues Ticket</span>
                     </a>
                  </li>

                  <li class="nav__item">
                     <a href="#" class="nav__link">
                        <span>Alle Tickets</span>
                     </a>
                  </li>

                  <li class="nav__item">
                     <a href="#" class="nav__link" id="nav-login">
                        <span>Anmelden</span>
                     </a>
                  </li>
               </ul>

               <!-- Close button -->
               <div class="nav__close" id="nav-close">
                  <i class="ri-close-large-line"></i>
               </div>

               <div class="nav__social">
                  <a href="https://github.com/tishutox/SWISS" target="_blank" class="nav__social-link">
                     <i class="ri-github-line"></i>
                  </a>
               </div>
            </div>

            <!-- Toggle button -->
            <div class="nav__toggle" id="nav-toggle">
               <i class="ri-menu-line"></i>
            </div>
         </nav>
      </header>

      <!--==================== MAIN ====================-->
      <main>
         <!-- Insert page sections -->
      </main>

      <!--==================== LOGIN MODAL ====================-->
      <div class="auth-modal" id="auth-modal" aria-hidden="true">
         <div class="auth-modal__backdrop" data-auth-close></div>

         <section class="auth-modal__panel" role="dialog" aria-modal="true" aria-labelledby="auth-title">
            <button type="button" class="auth-modal__close" id="auth-close" aria-label="Login schliessen">
               <i class="ri-close-large-line"></i>
            </button>

            <h2 class="auth-modal__title" id="auth-title">ANMELDEN</h2>
            <p class="auth-modal__subtitle">Mit Nutzername oder E-Mail und Passwort einloggen.</p>

            <form class="auth-modal__form" id="auth-form" novalidate>
               <label class="auth-modal__field" for="auth-identifier">Nutzername oder E-Mail</label>
               <input
                  class="auth-modal__input"
                  id="auth-identifier"
                  name="identifier"
                  type="text"
                  autocomplete="username"
                  required
               >

               <label class="auth-modal__field" for="auth-password">Passwort</label>
               <input
                  class="auth-modal__input"
                  id="auth-password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  required
               >

               <p class="auth-modal__message" id="auth-message" aria-live="polite"></p>

               <button type="submit" class="auth-modal__submit">ANMELDEN</button>
            </form>
         </section>
      </div>
      
      <!--=============== MAIN JS ===============-->
      <script src="assets/js/main.js"></script>
   </body>
</html>

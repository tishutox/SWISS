<!DOCTYPE html>
   <html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <!--=============== REMIXICONS ===============-->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">

      <!--=============== CSS ===============-->
      <link rel="stylesheet" href="assets/css/styles.css">

      <title>Responsive navbar - Bedimcode</title>
   </head>
   <body>
      <!--==================== HEADER ====================-->
      <header class="header" id="header">
         <nav class="nav container">
               <a href="https://www.tha.de/Informatik/Wirtschaftsinformatik-Bachelor.html" class="nav__logo" target="_blank" rel="noopener noreferrer">
                  <img src="assets/img/logo.png" alt="SWISS Ticket logo" class="nav__logo-img">
               </a>

            <div class="nav__menu" id="nav-menu">
               <ul class="nav__list">
                  <li class="nav__item">
                     <a href="#" class="nav__link" id="nav-new-ticket">
                        <span>Neues Ticket</span>
                     </a>
                  </li>

                  <li class="nav__item">
                     <a href="#" class="nav__link">
                        <span>Alle Tickets</span>
                     </a>
                  </li>

                  <li class="nav__item">
                     <a href="#" class="nav__link" id="nav-login">
                        <span>Anmelden</span>
                     </a>
                  </li>
               </ul>

               <!-- Close button -->
               <div class="nav__close" id="nav-close">
                  <i class="ri-close-large-line"></i>
               </div>

               <div class="nav__social">
                  <a href="https://github.com/tishutox/SWISS" target="_blank" class="nav__social-link">
                     <i class="ri-github-line"></i>
                  </a>
               </div>
            </div>

            <!-- Toggle button -->
            <div class="nav__toggle" id="nav-toggle">
               <i class="ri-menu-line"></i>
            </div>
         </nav>
      </header>

      <!--==================== MAIN ====================-->
      <main>
         <!-- Insert page sections -->
      </main>

      <!--==================== LOGIN MODAL ====================-->
      <div class="auth-modal" id="auth-modal" aria-hidden="true">
         <div class="auth-modal__backdrop" data-auth-close></div>

         <section class="auth-modal__panel" role="dialog" aria-modal="true" aria-labelledby="auth-title">
            <button type="button" class="auth-modal__close" id="auth-close" aria-label="Login schließen">
               <i class="ri-close-large-line"></i>
            </button>

            <h2 class="auth-modal__title" id="auth-title">ANMELDEN</h2>
            <p class="auth-modal__subtitle">Mit Nutzername oder E-Mail und Passwort einloggen.</p>

            <form class="auth-modal__form" id="auth-form" novalidate>
               <label class="auth-modal__field" for="auth-identifier">Nutzername oder E-Mail</label>
               <input
                  class="auth-modal__input"
                  id="auth-identifier"
                  name="identifier"
                  type="text"
                  autocomplete="username"
                  required
               >

               <label class="auth-modal__field" for="auth-password">Passwort</label>
               <input
                  class="auth-modal__input"
                  id="auth-password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  required
               >

               <p class="auth-modal__message" id="auth-message" aria-live="polite"></p>

               <button type="submit" class="auth-modal__submit">ANMELDEN</button>
            </form>
         </section>
      </div>

      <!--==================== NEW TICKET MODAL ====================-->
      <div class="ticket-modal" id="ticket-modal" aria-hidden="true">
         <div class="ticket-modal__backdrop" data-ticket-close></div>

         <section class="ticket-modal__panel" role="dialog" aria-modal="true" aria-labelledby="ticket-title">
            <button type="button" class="ticket-modal__close" id="ticket-close" aria-label="Ticket-Modal schließen">
               <i class="ri-close-large-line"></i>
            </button>

            <h2 class="ticket-modal__title" id="ticket-title">NEUES TICKET</h2>
            <p class="ticket-modal__subtitle">Bitte alle Pflichtfelder ausfüllen.</p>

            <form class="ticket-modal__form" id="ticket-form" novalidate>
               <label class="ticket-modal__field" for="ticket-firstname">Vorname*</label>
               <input class="ticket-modal__input" id="ticket-firstname" name="firstName" type="text" required>

               <label class="ticket-modal__field" for="ticket-lastname">Nachname*</label>
               <input class="ticket-modal__input" id="ticket-lastname" name="lastName" type="text" required>

               <label class="ticket-modal__field" for="ticket-nickname">Spitzname*</label>
               <input class="ticket-modal__input" id="ticket-nickname" name="nickName" type="text" required>

               <label class="ticket-modal__field" for="ticket-email">E-Mail (@tha.de)*</label>
               <input
                  class="ticket-modal__input"
                  id="ticket-email"
                  name="email"
                  type="email"
                  inputmode="email"
                  pattern="^[^\s@]+@tha\.de$"
                  required
               >

               <label class="ticket-modal__field" for="ticket-number">Nummer (optional)</label>
               <input class="ticket-modal__input" id="ticket-number" name="phoneNumber" type="tel" inputmode="tel">

               <label class="ticket-modal__field" for="ticket-discord">Discord-Username (optional)</label>
               <input class="ticket-modal__input" id="ticket-discord" name="discord" type="text">

               <label class="ticket-modal__field" for="ticket-module">Modul (optional)</label>
               <select class="ticket-modal__input" id="ticket-module" name="module">
                  <option value="kein-modul" selected>kein Modul</option>
                  <option value="mathematik">Mathematik</option>
                  <option value="programmieren">Programmieren</option>
               </select>

               <label class="ticket-modal__field" for="ticket-title-input">Titel* (max. 30 Zeichen)</label>
               <input class="ticket-modal__input" id="ticket-title-input" name="title" type="text" maxlength="30" required>

               <label class="ticket-modal__field" for="ticket-message">Nachricht* (max. 5000 Zeichen)</label>
               <textarea class="ticket-modal__input ticket-modal__textarea" id="ticket-message" name="message" maxlength="5000" required></textarea>

               <label class="ticket-modal__field" for="ticket-priority">Dringlichkeit*</label>
               <select class="ticket-modal__input" id="ticket-priority" name="priority" required>
                  <option value="" selected disabled>Bitte wählen</option>
                  <option value="niedrig">Niedrig</option>
                  <option value="mittel">Mittel</option>
                  <option value="hoch">Hoch</option>
               </select>

               <label class="ticket-modal__field" for="ticket-assignment">Zuweisung</label>
               <select class="ticket-modal__input" id="ticket-assignment" name="assignment">
                  <option value="egal" selected>Egal</option>
                  <option value="armand">Armand</option>
                  <option value="ibrahim">Ibrahim</option>
               </select>

               <p class="ticket-modal__message" id="ticket-message-feedback" aria-live="polite"></p>

               <button type="submit" class="ticket-modal__submit">TICKET ERSTELLEN</button>
            </form>
         </section>
      </div>
      
      <!--=============== MAIN JS ===============-->
      <script src="assets/js/main.js"></script>
   </body>
</html>
